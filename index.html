<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غزل القلوب - يامي 🇾🇪</title>
    <style>
        body { margin: 0; background-color: #000; color: white; font-family: 'Arial', sans-serif; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* واجهة إدخال البيانات */
        .overlay { position: relative; background: rgba(15, 15, 15, 0.95); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #ff4500; box-shadow: 0 0 30px rgba(255, 69, 0, 0.4); z-index: 100; width: 85%; max-width: 350px; backdrop-filter: blur(10px); }
        
        h2 { color: #ff4500; margin-top: 0; font-size: 22px; text-shadow: 0 0 10px #ff4500; }
        input, select, button { display: block; width: 100%; margin: 12px 0; padding: 14px; border-radius: 10px; border: 1px solid #333; font-size: 16px; background: #1a1a1a; color: white; box-sizing: border-box; outline: none; }
        
        button { background: linear-gradient(45deg, #ff4500, #ff0055); cursor: pointer; font-weight: bold; border: none; transition: 0.3s; }
        button:hover { transform: scale(1.05); box-shadow: 0 0 20px #ff4500; }
        
        .credits { position: fixed; bottom: 10px; left: 10px; font-size: 11px; color: #333; z-index: 5; }
    </style>
</head>
<body>

    <div class="credits">تصميم: يامي 🇾🇪</div>

    <div class="overlay" id="setup">
        <h2>أداة غزل القلوب 🇾🇪</h2>
        <input type="text" id="name1" placeholder="الاسم الأول">
        <input type="text" id="name2" placeholder="الاسم الثاني">
        <select id="relation">
            <option value="♥️">♥️ حب</option>
            <option value="🫶💗">🫶💗 صداقة</option>
            <option value="🩵">🩵 قريب</option>
        </select>
        <button onclick="startDrawing()">ابدأ الرسم البطيء</button>
    </div>

    <canvas id="heartCanvas"></canvas>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');
    
    let w, h, name1, name2, emoji;
    let i = 0;
    let finished = false;

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // معادلات القلب الحسابية
    function heartX(n) { return 15 * Math.pow(Math.sin(n), 3); }
    function heartY(n) { return -(12 * Math.cos(n) - 5 * Math.cos(2*n) - 2 * Math.cos(3*n) - Math.cos(4*n)); }

    function startDrawing() {
        name1 = document.getElementById('name1').value || "أنت";
        name2 = document.getElementById('name2').value || "هو";
        emoji = document.getElementById('relation').value;
        
        document.getElementById('setup').style.display = 'none';
        animate();
    }

    function animate() {
        // تأثير مسح خفيف لترك أثر جمالي
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, w, h);

        ctx.save();
        ctx.translate(w/2, h/2);
        
        // تأثير النبض البطيء للهيكل
        let pulse = Math.sin(Date.now() / 1500) * 0.3 + 12;

        let currentLimit = finished ? 630 : i;
        
        for(let n = 0; n < currentLimit; n += 0.8) {
            let x = heartX(n) * pulse;
            let y = heartY(n) * pulse;
            
            // تدرج لوني ناعم
            ctx.strokeStyle = `hsla(${(n*10 + Date.now()/20)%360}, 80%, 60%, 0.8)`;
            ctx.lineWidth = 1.2;
            
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(0, 0); // العودة للمركز (تأثير الغزل)
            ctx.stroke();
        }
        ctx.restore();

        // رسم الأسماء في الأعلى
        drawNames();

        if (i < 630) {
            i += 0.4; // سرعة الرسم (بطيئة كما طلبت)
            requestAnimationFrame(animate);
        } else {
            finished = true;
            requestAnimationFrame(animate); // الاستمرار في النبض بعد الانتهاء
        }
    }

    function drawNames() {
        ctx.save();
        ctx.fillStyle = "white";
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#ff4500";
        ctx.font = "bold 28px Arial";
        ctx.textAlign = "center";
        
        // حركة عائمة للنص
        let float = Math.sin(Date.now() / 1500) * 6;
        ctx.fillText(`${name1} ${emoji} ${name2}`, w/2, h*0.18 + float);
        ctx.restore();
    }
</script>
</body>
</html>
